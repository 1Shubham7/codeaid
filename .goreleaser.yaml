version: 2

before:
  hooks:
    - go mod download

builds:
  - binary: codeaid
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    ignore:
      - goos: windows
        goarch: arm64
    ldflags:
      - -s -w -X main.version={{.Version}}

archives:
  - formats:
      - tar.gz
    format_overrides:
      - goos: windows
        formats:
          - zip
    name_template: "{{ .ProjectName }}-{{ .Version }}-{{ .Os }}-{{ .Arch }}"

changelog:
  sort: asc
  groups:
    - title: Features
      regexp: '^.*\(feat\).*|^.*feat:.*'
      order: 0
    - title: Bug Fixes
      regexp: '^.*\(fix\).*|^.*fix:.*'
      order: 1
    - title: Other
      order: 999
  filters:
    exclude:
      - "^chore"
      - "^docs"
      - "Merge pull request"

release:
  github:
    owner: 1shubham7
    name: codeaid
  name_template: "v{{ .Version }}"
